name: Credex Continuous Integration Pipeline

# Triggers when code is pushed or pulled against the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  execute-audit-tests:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the repository onto the GitHub cloud runner environment
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # Step 2: Establish the precise Node version matrix match for May 2026 specifications
    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # Step 3: Restore pristine dependency nodes bypassing broken local environment loops
    - name: Clean Install Project Dependencies
      run: npm ci

    # Step 4: Run strict TypeScript compilation check to verify type-safety interfaces
    - name: Execute TypeScript Compilation Check
      run: npm run build

    # Step 5: Fire the automated deterministic unit test suites forcefully via direct binaries
    - name: Run Automated Vitest Spec Matrix
      run: npx vitest run